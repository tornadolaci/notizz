<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notizz - Új címre költöztünk</title>
    <meta name="robots" content="noindex" />
    <meta http-equiv="refresh" content="6;url=https://nomadnet.hu/app/notizz/" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f2f2f7;
        color: #1c1c1e;
        text-align: center;
        padding: 16px;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #000; color: #fff; }
        .card { background: #1c1c1e !important; }
      }
      .card {
        background: #fff;
        border-radius: 24px;
        padding: 48px 32px;
        max-width: 420px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      }
      h1 {
        font-size: 40px;
        margin: 0 0 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      p { line-height: 1.5; margin: 0 0 24px; }
      a.button {
        display: inline-block;
        padding: 14px 28px;
        border-radius: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
      .small { font-size: 14px; opacity: 0.7; margin-top: 24px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Notizz!</h1>
      <p>
        Az alkalmazás új címre költözött.<br />
        Kérjük, telepítsd újra az appot az új címről!
      </p>
      <a class="button" href="https://nomadnet.hu/app/notizz/">Tovább az új Notizz-hez</a>
      <p class="small">Automatikus átirányítás 6 másodperc múlva&hellip;</p>
    </div>
    <script>
      // Clean up the old PWA installation: unregister every service worker
      // and drop the caches, so installed apps stop serving the old version
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) { reg.unregister(); });
        });
        if (window.caches) {
          caches.keys().then(function (keys) {
            keys.forEach(function (key) { caches.delete(key); });
          });
        }
      }
      setTimeout(function () {
        window.location.replace('https://nomadnet.hu/app/notizz/');
      }, 6000);
    </script>
  </body>
</html>
