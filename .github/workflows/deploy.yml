name: Deploy to nomadnet.hu

# Manual trigger only until the FTP secrets are configured in the repo
# settings. Once they exist, a push trigger on main can be added:
#   push:
#     branches: [main]
#
# Required repository secrets:
#   DEPLOY_FTP_HOST       e.g. ftp.nomadnet.hu
#   DEPLOY_FTP_USER       hosting FTP user
#   DEPLOY_FTP_PASSWORD   hosting FTP password
#   DEPLOY_FTP_TARGET_DIR e.g. /public_html/app/notizz/
#
# NOT deployed by this workflow (one-time manual steps on the server):
#   - /notizz_config/config.php (DB + SMTP credentials, outside the docroot)
#   - MySQL schema (server/migrations/*.sql via phpMyAdmin or CLI)

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Assemble deploy tree (frontend + PHP API)
        run: |
          mkdir -p deploy
          cp -r dist/. deploy/
          cp -r server/api deploy/api

      - name: Upload via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DEPLOY_FTP_HOST }}
          username: ${{ secrets.DEPLOY_FTP_USER }}
          password: ${{ secrets.DEPLOY_FTP_PASSWORD }}
          protocol: ftps
          local-dir: deploy/
          server-dir: ${{ secrets.DEPLOY_FTP_TARGET_DIR }}
