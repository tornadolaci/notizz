name: Deploy redirect page to GitHub Pages

# One-off: publishes the "we moved" redirect page to the OLD GitHub Pages
# URL (tornadolaci.github.io/notizz). The page redirects users to
# https://nomadnet.hu/app/notizz/ and its sw.js self-destructs the old
# installed PWA (cache wipe + unregister).

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload redirect page
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-redirect

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
